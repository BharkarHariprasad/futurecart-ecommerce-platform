<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FutureCart Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== BODY ===== */
body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f5f7fa, #e4ecf5);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}

/* ===== LOGIN CARD ===== */
.admin-login-box {
    width: 100%;
    max-width: 380px;
    background: #ffffff;
    border-radius: 12px;
    padding: 30px 28px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}

/* ===== HEADER ===== */
.admin-title {
    text-align: center;
    margin-bottom: 24px;
}

.admin-title h2 {
    font-size: 22px;
    font-weight: 800;
    color: #282c3f;
    margin-bottom: 6px;
}

.admin-title p {
    font-size: 13px;
    color: #757575;
}

/* ===== FORM ===== */
.admin-form {
    display: flex;
    flex-direction: column;
}

/* Form group */
.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 16px;
}

/* Label */
.form-group label {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #282c3f;
}

/* Input */
.form-group input {
    height: 40px;
    padding: 0 12px;
    border-radius: 6px;
    border: 1px solid #dcdcdc;
    font-size: 14px;
    outline: none;
}

.form-group input:focus {
    border-color: #ff3f6c;
    box-shadow: 0 0 0 2px rgba(255, 63, 108, 0.15);
}

/* ===== BUTTON ===== */
.admin-login-btn {
    margin-top: 10px;
    height: 42px;
    border-radius: 999px;
    border: none;
    background: #ff3f6c;
    color: #ffffff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.25s ease;
}

.admin-login-btn:hover {
    background: #e63260;
}

/* ===== FOOTER ===== */
.admin-footer {
    text-align: center;
    margin-top: 18px;
    font-size: 12px;
    color: #757575;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 420px) {
    .admin-login-box {
        padding: 24px 20px;
    }
}
</style>
</head>

<body>

<div class="admin-login-box">

    <!-- Title -->
    <div class="admin-title">
        <h2>Admin Login</h2>
        <p>FutureCart Dashboard Access</p>
    </div>

    <!-- Form -->
    <form class="admin-form" action="adminLogin" method="post">

        <div class="form-group">
            <label>Admin Email</label>
            <input type="email" name="email" placeholder="admin@futurecart.com" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="admin-login-btn">
            Login as Admin
        </button>

    </form>

    <!-- Footer -->
    <div class="admin-footer">
        © 2025 FutureCart Admin Panel
    </div>

</div>

</body>
</html>
